services:
  - type: web
    name: algotrade-miniapp
    runtime: static
    buildCommand: ''
    staticPublishPath: ./public/mini-app
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-store, no-cache, must-revalidate, max-age=0
      - path: /*
        name: Pragma
        value: no-cache
      - path: /*
        name: Expires
        value: '0'
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
