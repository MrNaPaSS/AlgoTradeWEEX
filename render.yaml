services:
  - type: web
    name: algotrade-web
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/web.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: algotrade-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false

databases:
  - name: algotrade-db
    databaseName: algotrade
    user: algotrade
    plan: free
